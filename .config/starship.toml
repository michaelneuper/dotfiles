## FIRST LINE/ROW
# First param
[directory]
style = "purple"
truncation_length = 0
truncate_to_repo = true
truncation_symbol = "´à╝ repo: "
read_only =  " ­ƒöÆ "
read_only_style = "red"

# Before all the version info (python, nodejs, php, etc.)
[git_status]
style = "bold red"
ahead = "Ôçí${count}"
diverged = "ÔçòÔçí${ahead_count}Ôçú${behind_count}"
behind = "Ôçú${count}"
deleted = "Ô£ÿ"
conflicted = "="
untracked = "?"
stashed = "$"
modified = "!"
staged = "+"
renamed = "┬╗"

# Command duration
[cmd_duration]
min_time = 1
show_milliseconds = false
format = "took [$duration]($style)"
disabled = true

## SECOND LINE/ROW
# Somethere at the beginning
[battery]
full_symbol = "´ò© "
charging_symbol = "´ûâ "
discharging_symbol = "´ûé "
disabled = true

[[battery.display]]  # "bold red" style when capacity is between 0% and 10%
threshold = 15
style = "bold red"
disabled = true

[[battery.display]]  # "bold yellow" style when capacity is between 10% and 30%
threshold = 50
style = "bold yellow"
disabled = true

[[battery.display]]  # "bold green" style when capacity is between 10% and 30%
threshold = 80
style = "bold green"
disabled = true

[character]  # Tells whether last command was successful or not
success_symbol = " [ÔØ»](bold green)"
error_symbol = " [Ô£û ](bold red)"
vicmd_symbol = "[ÔØ«](bold green)"

# SYMBOLS
[status]
symbol = "­ƒö┤"
format = '[\[$symbol$status_common_meaning$status_signal_name$status_maybe_int\]]($style)'
map_symbol = true
disabled = false

